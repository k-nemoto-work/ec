<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400;1,700&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/views.css">
</head>
<body>

  <nav id="main-nav">
    <div class="nav-inner">
      <a href="#/" class="nav-brand">REUSE<span class="brand-dot">·</span>MKT</a>
      <div class="nav-links" id="nav-links-desktop">
        <a href="#/" class="nav-link">BROWSE</a>
        <a href="#/cart" class="nav-link nav-link-cart" id="nav-cart">
          BAG <span class="cart-badge" id="cart-badge">0</span>
        </a>
        <a href="#/login"  class="nav-link" id="nav-login">LOG IN</a>
        <a href="#/profile" class="nav-link" id="nav-profile" style="display:none">ACCOUNT</a>
        <a href="#/orders"  class="nav-link" id="nav-orders"  style="display:none">ORDERS</a>
        <button class="nav-link btn-link" id="nav-logout" style="display:none">LOG OUT</button>
      </div>
      <button class="hamburger" id="hamburger" aria-label="Menu" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
    </div>

    <div class="nav-mobile" id="nav-mobile" aria-hidden="true">
      <a href="#/" class="nav-link">BROWSE</a>
      <a href="#/cart" class="nav-link">BAG <span id="mob-cart-badge">0</span></a>
      <a href="#/login"   class="nav-link" id="mob-login">LOG IN</a>
      <a href="#/profile" class="nav-link" id="mob-profile" style="display:none">ACCOUNT</a>
      <a href="#/orders"  class="nav-link" id="mob-orders"  style="display:none">ORDERS</a>
      <button class="nav-link btn-link" id="mob-logout" style="display:none">LOG OUT</button>
    </div>
  </nav>

  <main id="app-root"></main>

  <div id="toast-container" role="alert" aria-live="polite"></div>

  <script>
    // Global toast — no circular import needed
    window.toast = function(msg, type) {
      type = type || 'info';
      var c = document.getElementById('toast-container');
      var t = document.createElement('div');
      t.className = 'toast toast-' + type;
      t.textContent = msg;
      c.appendChild(t);
      requestAnimationFrame(function() { t.classList.add('show'); });
      setTimeout(function() {
        t.classList.remove('show');
        setTimeout(function() { if (t.parentNode) t.parentNode.removeChild(t); }, 350);
      }, 3200);
    };

    window.escapeHtml = function(str) {
      if (str == null) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    };

    window.formatPrice = function(n) {
      return '¥' + Number(n).toLocaleString('ja-JP');
    };

    // Deterministic geometric SVG from product ID
    window.productPattern = function(id) {
      var seed = (id || 'default').replace(/-/g, '');
      function hi(i) { return parseInt(seed.slice(i * 2, i * 2 + 2) || 'aa', 16); }
      var h1 = hi(0) % 360;
      var h2 = (h1 + 137) % 360;
      var h3 = (h1 + 270) % 360;
      var cx1 = hi(1) % 80 + 10;
      var cy1 = hi(2) % 80 + 10;
      var r1  = hi(3) % 35 + 25;
      var cx2 = 200 - (hi(4) % 80 + 10);
      var cy2 = 200 - (hi(5) % 80 + 10);
      var rot = hi(6) % 60;
      var tx  = hi(7) % 120 + 40;
      var ty  = hi(8) % 120 + 40;
      return '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" preserveAspectRatio="xMidYMid slice" width="100%" height="100%">'
        + '<rect width="200" height="200" fill="hsl(' + h1 + ',18%,86%)"/>'
        + '<circle cx="' + cx1 + '" cy="' + cy1 + '" r="' + r1 + '" fill="hsl(' + h1 + ',38%,72%)" opacity="0.55"/>'
        + '<circle cx="' + cx2 + '" cy="' + cy2 + '" r="' + (r1 * 0.65) + '" fill="hsl(' + h2 + ',42%,68%)" opacity="0.45"/>'
        + '<polygon points="' + tx + ',' + (ty - r1 * 0.8) + ' ' + (tx + r1 * 0.7) + ',' + (ty + r1 * 0.5) + ' ' + (tx - r1 * 0.7) + ',' + (ty + r1 * 0.5) + '"'
        + ' fill="hsl(' + h3 + ',30%,60%)" opacity="0.3" transform="rotate(' + rot + ' 100 100)"/>'
        + '<line x1="0" y1="' + (hi(9) % 160 + 20) + '" x2="200" y2="' + (hi(10) % 160 + 20) + '"'
        + ' stroke="hsl(' + h1 + ',25%,55%)" stroke-width="1" opacity="0.2"/>'
        + '<line x1="' + (hi(11) % 160 + 20) + '" y1="0" x2="' + (hi(12) % 160 + 20) + '" y2="200"'
        + ' stroke="hsl(' + h2 + ',20%,60%)" stroke-width="0.8" opacity="0.15"/>'
        + '</svg>';
    };

    window.statusStamp = function(status) {
      var labels = { ON_SALE: '販売中', RESERVED: '予約済', SOLD: '売約済', PRIVATE: '非公開' };
      var cls    = { ON_SALE: 'on-sale', RESERVED: 'reserved', SOLD: 'sold', PRIVATE: 'reserved' };
      return '<span class="status-stamp ' + (cls[status] || '') + '">' + (labels[status] || window.escapeHtml(status)) + '</span>';
    };

    window.showConfirm = function(message) {
      return new Promise(function(resolve) {
        var overlay = document.createElement('div');
        overlay.className = 'confirm-overlay';
        overlay.innerHTML =
          '<div class="confirm-dialog" role="dialog" aria-modal="true">'
          + '<p>' + window.escapeHtml(message) + '</p>'
          + '<div class="confirm-dialog-actions">'
          + '<button class="btn-secondary" id="confirm-cancel">CANCEL</button>'
          + '<button class="btn-danger"    id="confirm-ok">OK</button>'
          + '</div>'
          + '</div>';
        document.body.appendChild(overlay);
        function cleanup(result) {
          document.body.removeChild(overlay);
          resolve(result);
        }
        overlay.querySelector('#confirm-ok').addEventListener('click', function() { cleanup(true); });
        overlay.querySelector('#confirm-cancel').addEventListener('click', function() { cleanup(false); });
        overlay.addEventListener('click', function(e) { if (e.target === overlay) cleanup(false); });
      });
    };
  </script>

  <script type="module" src="/js/app.js"></script>
</body>
</html>
