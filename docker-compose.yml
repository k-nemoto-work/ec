services:
  dev:
    image: mcr.microsoft.com/devcontainers/java:1-21-bookworm
    container_name: ec-dev
    volumes:
      - .:/workspace:cached
    working_dir: /workspace
    command: sleep infinity
    depends_on:
      - db
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/ec_dev

  db:
    image: postgres:16-alpine
    container_name: ec-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ec_user
      POSTGRES_PASSWORD: ec_pass
      POSTGRES_DB: ec_dev
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  plantuml:
    image: plantuml/plantuml-server:jetty
    container_name: ec-plantuml
    restart: unless-stopped

volumes:
  pg_data:
